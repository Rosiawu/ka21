name: Update Podcast Dashboard Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '15 1 * * *'

permissions:
  contents: write

concurrency:
  group: podcast-dashboard-update
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture podcast snapshot
        run: npm run podcast:capture-snapshot

      - name: Commit and push data updates
        run: |
          if git diff --quiet -- data/podcast-dashboard/config.json data/podcast-dashboard/episodes-cache.json data/podcast-dashboard/snapshots.json; then
            echo "No podcast data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/podcast-dashboard/config.json data/podcast-dashboard/episodes-cache.json data/podcast-dashboard/snapshots.json
          git commit -m "chore: update podcast dashboard snapshot"
          git push
