<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>约战报名板 | KA21</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf5f5;
      --card: #ffffff;
      --card-hover: #fdf2f2;
      --accent: #e06b6b;
      --accent-dark: #c94e4e;
      --accent-light: #f4a3a3;
      --gold: #d4a853;
      --text: #1a1a2e;
      --text-muted: #8b7e7e;
      --text-dim: #a89999;
      --border: #f0e0e0;
      --danger: #ef4444;
      --warning: #f59e0b;
      --radius: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 120px;
    }

    /* KA21 rose-gold subtle pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, rgba(224,107,107,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 100%, rgba(212,168,83,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    .header {
      padding: 20px 16px 10px;
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      z-index: 50;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Playfair Display', Georgia, 'Noto Serif SC', serif;
    }

    .header h1 .emoji {
      font-size: 26px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 12px 16px;
    }

    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 8px;
      text-align: center;
      border: 1px solid var(--border);
      transition: transform 0.2s;
      box-shadow: 0 2px 8px rgba(224,107,107,0.06);
    }

    .stat-card:active {
      transform: scale(0.96);
    }

    .stat-card .number {
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      font-family: 'Playfair Display', Georgia, serif;
    }

    .stat-card .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .filter-tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      background: var(--card);
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
      box-shadow: 0 2px 10px rgba(224,107,107,0.25);
    }

    /* Activity List */
    .activity-list {
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .activity-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      animation: fadeInUp 0.4s ease forwards;
      opacity: 0;
      transform: translateY(16px);
      box-shadow: 0 2px 12px rgba(224,107,107,0.05);
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .activity-header {
      padding: 14px 16px 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .activity-title-wrap {
      flex: 1;
      min-width: 0;
    }

    .activity-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .activity-title .sport-emoji {
      font-size: 20px;
    }

    .activity-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .activity-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .status-badge.open {
      background: rgba(224, 107, 107, 0.12);
      color: var(--accent);
    }

    .status-badge.closed {
      background: rgba(139, 126, 126, 0.1);
      color: var(--text-muted);
    }

    .status-badge.ended {
      background: rgba(168, 153, 153, 0.1);
      color: var(--text-dim);
    }

    .activity-body {
      padding: 0 16px 12px;
    }

    .note {
      font-size: 13px;
      color: var(--text-muted);
      background: #fdf6f6;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      border: 1px solid #f5e6e6;
    }

    .progress-wrap {
      margin-bottom: 10px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .progress-bar-bg {
      height: 6px;
      background: #f5e6e6;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .players-section {
      margin-top: 10px;
    }

    .section-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .players-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .player-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: rgba(224, 107, 107, 0.08);
      border: 1px solid rgba(224, 107, 107, 0.2);
      border-radius: 16px;
      font-size: 12px;
      color: var(--accent);
      animation: popIn 0.3s ease;
    }

    .player-chip.absent {
      background: rgba(168, 153, 153, 0.1);
      border-color: rgba(168, 153, 153, 0.25);
      color: var(--text-dim);
      text-decoration: line-through;
      opacity: 0.7;
    }

    .player-chip .avatar {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .player-chip.absent .avatar {
      background: var(--text-dim);
    }

    @keyframes popIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .activity-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 16px 14px;
    }

    .btn {
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-sm {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 8px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .emoji {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .empty-state h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 13px;
    }

    /* Floating Action Button */
    .fab {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 30px;
      border: none;
      box-shadow: 0 4px 20px rgba(224, 107, 107, 0.35);
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .fab:active {
      transform: translateX(-50%) scale(0.95);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 46, 0.45);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal-sheet {
      background: var(--card);
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      border-radius: 24px 24px 0 0;
      padding: 20px 20px 30px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      overflow-y: auto;
      box-shadow: 0 -4px 24px rgba(224,107,107,0.08);
    }

    .modal-overlay.show .modal-sheet {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .modal-header h2 {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Playfair Display', Georgia, 'Noto Serif SC', serif;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg);
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fdf8f8;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    .form-input:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(224, 107, 107, 0.1);
    }

    .form-input::placeholder {
      color: var(--text-dim);
    }

    .sport-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .sport-option {
      padding: 8px 14px;
      border-radius: 20px;
      background: #fdf8f8;
      border: 1px solid var(--border);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted);
    }

    .sport-option.selected {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
      box-shadow: 0 2px 10px rgba(224,107,107,0.2);
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .form-actions .btn {
      flex: 1;
    }

    /* Player Pool Drawer */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 46, 0.4);
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .drawer-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 85%;
      max-width: 320px;
      background: var(--card);
      z-index: 160;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 20px rgba(224,107,107,0.06);
    }

    .drawer.show {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .drawer-header h3 {
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .pool-input-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .pool-input-wrap .form-input {
      flex: 1;
    }

    .pool-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pool-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #fdf8f8;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .pool-item-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pool-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent-dark);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pool-name {
      font-size: 14px;
      font-weight: 500;
    }

    .pool-delete {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
    }

    .drawer-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--card);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(224,107,107,0.12);
      z-index: 300;
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Delete confirm */
    .delete-btn-wrap {
      display: flex;
      justify-content: flex-end;
      padding: 0 16px 10px;
    }

    /* Name input modal */
    .name-chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
      max-height: 160px;
      overflow-y: auto;
    }

    .name-chip-item {
      padding: 6px 12px;
      background: #fdf8f8;
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-muted);
    }

    .name-chip-item:active {
      transform: scale(0.95);
    }

    .name-chip-item.selected {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(224,107,107,0.2);
    }

    @media (min-width: 640px) {
      body {
        max-width: 480px;
        margin: 0 auto;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        box-shadow: 0 0 40px rgba(224,107,107,0.06);
      }

      .modal-overlay {
        align-items: center;
      }

      .modal-sheet {
        border-radius: 24px;
        max-height: 80vh;
        transform: translateY(20px) scale(0.96);
      }

      .modal-overlay.show .modal-sheet {
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1><span class="emoji">🏆</span>约战报名板</h1>
    <p class="subtitle">告别微信群接龙，一键组织约球</p>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="number" id="stat-active">0</div>
      <div class="label">进行中</div>
    </div>
    <div class="stat-card">
      <div class="number" id="stat-total">0</div>
      <div class="label">累计报名</div>
    </div>
    <div class="stat-card">
      <div class="number" id="stat-today">0</div>
      <div class="label">今日有约</div>
    </div>
  </div>

  <div class="filter-tabs" id="filterTabs">
    <div class="tab active" data-filter="all">全部</div>
    <div class="tab" data-filter="篮球">🏀篮球</div>
    <div class="tab" data-filter="足球">⚽足球</div>
    <div class="tab" data-filter="羽毛球">🏸羽毛球</div>
    <div class="tab" data-filter="排球">🏐排球</div>
    <div class="tab" data-filter="跑步">🏃跑步</div>
    <div class="tab" data-filter="其他">🎯其他</div>
  </div>

  <div class="activity-list" id="activityList">
    <div class="empty-state" id="emptyState">
      <div class="emoji">🏟️</div>
      <h3>还没有活动</h3>
      <p>点击右下角按钮，创建第一个约战吧</p>
    </div>
  </div>

  <button class="fab" id="fab" onclick="openCreateModal()">
    <span>+</span> 新建活动
  </button>

  <!-- Create Activity Modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2>📝 新建活动</h2>
        <button class="modal-close" onclick="closeCreateModal()">×</button>
      </div>
      <div class="form-group">
        <label class="form-label">活动名称</label>
        <input class="form-input" id="inputName" placeholder="例如：周日晚间篮球局">
      </div>
      <div class="form-group">
        <label class="form-label">运动项目</label>
        <div class="sport-selector" id="sportSelector">
          <div class="sport-option" data-sport="篮球">🏀 篮球</div>
          <div class="sport-option" data-sport="足球">⚽ 足球</div>
          <div class="sport-option" data-sport="羽毛球">🏸 羽毛球</div>
          <div class="sport-option" data-sport="排球">🏐 排球</div>
          <div class="sport-option" data-sport="跑步">🏃 跑步</div>
          <div class="sport-option" data-sport="其他">🎯 其他</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">时间</label>
        <input class="form-input" type="datetime-local" id="inputTime">
      </div>
      <div class="form-group">
        <label class="form-label">地点</label>
        <input class="form-input" id="inputLocation" placeholder="例如：北体篮球场">
      </div>
      <div class="form-group">
        <label class="form-label">人数上限（可选）</label>
        <input class="form-input" type="number" id="inputLimit" placeholder="不限" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">备注（可选）</label>
        <input class="form-input" id="inputNote" placeholder="带球、带水等">
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeCreateModal()">取消</button>
        <button class="btn btn-primary" onclick="submitCreate()">创建</button>
      </div>
    </div>
  </div>

  <!-- Sign Up / Leave Modal -->
  <div class="modal-overlay" id="nameModal">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 id="nameModalTitle">报名</h2>
        <button class="modal-close" onclick="closeNameModal()">×</button>
      </div>
      <p class="form-label" style="margin-bottom:8px">快速选择</p>
      <div class="name-chip-list" id="nameChipList"></div>
      <div class="form-group">
        <label class="form-label">或输入姓名</label>
        <input class="form-input" id="inputPlayerName" placeholder="输入姓名">
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeNameModal()">取消</button>
        <button class="btn btn-primary" id="nameModalConfirm" onclick="confirmNameAction()">确定</button>
      </div>
    </div>
  </div>

  <!-- Player Pool Drawer -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="playerDrawer">
    <div class="drawer-header">
      <h3>👥 队员库</h3>
      <button class="modal-close" onclick="closeDrawer()">×</button>
    </div>
    <div class="drawer-body">
      <div class="pool-input-wrap">
        <input class="form-input" id="poolInput" placeholder="添加队员姓名">
        <button class="btn btn-primary btn-sm" onclick="addPoolPlayer()">添加</button>
      </div>
      <div class="pool-list" id="poolList"></div>
    </div>
    <div class="drawer-footer">
      <p style="font-size:12px;color:var(--text-muted)">队员库用于快速报名时选择，不用每次都打字</p>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'match_signup_board_v1';
    const POOL_KEY = 'match_signup_pool_v1';

    const SPORT_EMOJI = {
      '篮球': '🏀',
      '足球': '⚽',
      '羽毛球': '🏸',
      '排球': '🏐',
      '跑步': '🏃',
      '其他': '🎯'
    };

    let activities = [];
    let playerPool = [];
    let currentFilter = 'all';
    let nameModalMode = 'signup'; // 'signup' or 'leave'
    let nameModalActivityId = null;
    let selectedPoolName = null;

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) activities = JSON.parse(raw);
      } catch (e) {}
      try {
        const raw = localStorage.getItem(POOL_KEY);
        if (raw) playerPool = JSON.parse(raw);
      } catch (e) {}
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(activities));
    }

    function savePool() {
      localStorage.setItem(POOL_KEY, JSON.stringify(playerPool));
    }

    function getStatus(activity) {
      const now = new Date();
      const time = new Date(activity.time);
      if (time < now) return 'ended';
      return 'open';
    }

    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const month = d.getMonth() + 1;
      const date = d.getDate();
      const dayNames = ['周日','周一','周二','周三','周四','周五','周六'];
      const day = dayNames[d.getDay()];
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return `${month}月${date}日 ${day} ${h}:${m}`;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function updateStats() {
      const now = new Date();
      const active = activities.filter(a => getStatus(a) !== 'ended').length;
      const total = activities.reduce((sum, a) => sum + (a.players?.length || 0), 0);
      const today = activities.filter(a => {
        const t = new Date(a.time);
        return t.getFullYear() === now.getFullYear() && t.getMonth() === now.getMonth() && t.getDate() === now.getDate();
      }).reduce((sum, a) => sum + (a.players?.length || 0), 0);
      document.getElementById('stat-active').textContent = active;
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-today').textContent = today;
    }

    function render() {
      const list = document.getElementById('activityList');
      const empty = document.getElementById('emptyState');
      const filtered = currentFilter === 'all'
        ? activities
        : activities.filter(a => a.sport === currentFilter);

      // sort: upcoming first, then ended
      filtered.sort((a, b) => new Date(b.time) - new Date(a.time));
      filtered.sort((a, b) => {
        const sa = getStatus(a) === 'ended' ? 1 : 0;
        const sb = getStatus(b) === 'ended' ? 1 : 0;
        return sa - sb;
      });

      if (filtered.length === 0) {
        list.innerHTML = '';
        list.appendChild(empty);
        empty.style.display = 'block';
        updateStats();
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = '';

      filtered.forEach((activity, idx) => {
        const status = getStatus(activity);
        const statusLabel = status === 'open' ? '报名中' : (status === 'ended' ? '已结束' : '已截止');
        const statusClass = status === 'open' ? 'open' : (status === 'ended' ? 'ended' : 'closed');
        const players = activity.players || [];
        const absent = activity.absent || [];
        const limit = activity.limit;
        const progress = limit ? Math.min((players.length / limit) * 100, 100) : 0;
        const progressText = limit ? `${players.length}/${limit}` : `${players.length}人`;

        const card = document.createElement('div');
        card.className = 'activity-card';
        card.style.animationDelay = `${idx * 0.06}s`;
        card.innerHTML = `
          <div class="activity-header">
            <div class="activity-title-wrap">
              <div class="activity-title">
                <span class="sport-emoji">${SPORT_EMOJI[activity.sport] || '🎯'}</span>
                <span>${escapeHtml(activity.name)}</span>
              </div>
              <div class="activity-meta">
                <span>📅 ${formatTime(activity.time)}</span>
                <span>📍 ${escapeHtml(activity.location || '待定')}</span>
              </div>
            </div>
            <div class="status-badge ${statusClass}">${statusLabel}</div>
          </div>
          ${activity.note ? `<div class="activity-body"><div class="note">📝 ${escapeHtml(activity.note)}</div></div>` : ''}
          <div class="activity-body">
            <div class="progress-wrap">
              <div class="progress-label">
                <span>已报名</span>
                <span>${progressText}</span>
              </div>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill" style="width: ${limit ? progress + '%' : '0'}"></div>
              </div>
            </div>
            ${players.length > 0 ? `
              <div class="players-section">
                <div class="section-label">报名 (${players.length})</div>
                <div class="players-row">
                  ${players.map(p => `
                    <div class="player-chip">
                      <span class="avatar">${p.charAt(0)}</span>
                      <span>${escapeHtml(p)}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
            ` : ''}
            ${absent.length > 0 ? `
              <div class="players-section" style="margin-top:8px">
                <div class="section-label">请假 (${absent.length})</div>
                <div class="players-row">
                  ${absent.map(p => `
                    <div class="player-chip absent">
                      <span class="avatar">${p.charAt(0)}</span>
                      <span>${escapeHtml(p)}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
            ` : ''}
          </div>
          <div class="delete-btn-wrap">
            <button class="btn btn-danger btn-sm" onclick="deleteActivity('${activity.id}')">🗑️ 删除活动</button>
          </div>
          <div class="activity-actions">
            <button class="btn btn-primary" onclick="openNameModal('signup', '${activity.id}')" ${status === 'ended' ? 'style="opacity:0.4;pointer-events:none"' : ''}>
              ✋ 我要报名
            </button>
            <button class="btn btn-secondary" onclick="openNameModal('leave', '${activity.id}')" ${status === 'ended' ? 'style="opacity:0.4;pointer-events:none"' : ''}>
              🚫 请假
            </button>
          </div>
        `;
        list.appendChild(card);
      });

      updateStats();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Create Modal
    let selectedSport = '篮球';
    function openCreateModal() {
      document.getElementById('createModal').classList.add('show');
      document.getElementById('inputName').value = '';
      document.getElementById('inputTime').value = '';
      document.getElementById('inputLocation').value = '';
      document.getElementById('inputLimit').value = '';
      document.getElementById('inputNote').value = '';
      selectedSport = '篮球';
      document.querySelectorAll('.sport-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.sport === '篮球');
      });
      setTimeout(() => document.getElementById('inputName').focus(), 100);
    }

    function closeCreateModal() {
      document.getElementById('createModal').classList.remove('show');
    }

    function submitCreate() {
      const name = document.getElementById('inputName').value.trim();
      const time = document.getElementById('inputTime').value;
      const location = document.getElementById('inputLocation').value.trim();
      const limit = document.getElementById('inputLimit').value;
      const note = document.getElementById('inputNote').value.trim();

      if (!name) {
        showToast('请填写活动名称');
        return;
      }
      if (!time) {
        showToast('请选择时间');
        return;
      }

      const activity = {
        id: 'a_' + Date.now(),
        name,
        sport: selectedSport,
        time,
        location,
        limit: limit ? parseInt(limit) : null,
        note,
        players: [],
        absent: []
      };

      activities.unshift(activity);
      saveData();
      closeCreateModal();
      render();
      showToast('活动创建成功');
    }

    // Sport selector
    document.getElementById('sportSelector').addEventListener('click', e => {
      const el = e.target.closest('.sport-option');
      if (!el) return;
      selectedSport = el.dataset.sport;
      document.querySelectorAll('.sport-option').forEach(opt => {
        opt.classList.toggle('selected', opt === el);
      });
    });

    // Filter tabs
    document.getElementById('filterTabs').addEventListener('click', e => {
      const el = e.target.closest('.tab');
      if (!el) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentFilter = el.dataset.filter;
      render();
    });

    // Name Modal (signup / leave)
    function openNameModal(mode, activityId) {
      nameModalMode = mode;
      nameModalActivityId = activityId;
      selectedPoolName = null;
      document.getElementById('nameModalTitle').textContent = mode === 'signup' ? '✋ 报名' : '🚫 请假';
      document.getElementById('nameModalConfirm').textContent = mode === 'signup' ? '确认报名' : '确认请假';
      document.getElementById('inputPlayerName').value = '';
      renderNameChips();
      document.getElementById('nameModal').classList.add('show');
    }

    function closeNameModal() {
      document.getElementById('nameModal').classList.remove('show');
    }

    function renderNameChips() {
      const container = document.getElementById('nameChipList');
      if (playerPool.length === 0) {
        container.innerHTML = '<p style="color:var(--text-dim);font-size:12px;width:100%">队员库为空，可直接输入姓名</p>';
        return;
      }
      container.innerHTML = playerPool.map(name => `
        <div class="name-chip-item ${selectedPoolName === name ? 'selected' : ''}" onclick="selectPoolName('${name}')">${escapeHtml(name)}</div>
      `).join('');
    }

    function selectPoolName(name) {
      selectedPoolName = selectedPoolName === name ? null : name;
      document.getElementById('inputPlayerName').value = selectedPoolName || '';
      renderNameChips();
    }

    function confirmNameAction() {
      const name = (selectedPoolName || document.getElementById('inputPlayerName').value).trim();
      if (!name) {
        showToast('请输入姓名');
        return;
      }

      const activity = activities.find(a => a.id === nameModalActivityId);
      if (!activity) return;

      if (nameModalMode === 'signup') {
        if (!activity.players) activity.players = [];
        if (!activity.absent) activity.absent = [];
        if (activity.players.includes(name)) {
          showToast('已经报名了');
          closeNameModal();
          return;
        }
        activity.absent = activity.absent.filter(n => n !== name);
        activity.players.push(name);
        showToast(`${name} 报名成功`);
      } else {
        if (!activity.absent) activity.absent = [];
        if (!activity.players) activity.players = [];
        if (activity.absent.includes(name)) {
          showToast('已经请假了');
          closeNameModal();
          return;
        }
        activity.players = activity.players.filter(n => n !== name);
        activity.absent.push(name);
        showToast(`${name} 已请假`);
      }

      saveData();
      closeNameModal();
      render();
    }

    // Delete activity
    function deleteActivity(id) {
      if (!confirm('确定删除这个活动吗？')) return;
      activities = activities.filter(a => a.id !== id);
      saveData();
      render();
      showToast('活动已删除');
    }

    // Player Pool Drawer
    function openDrawer() {
      document.getElementById('drawerOverlay').classList.add('show');
      document.getElementById('playerDrawer').classList.add('show');
      renderPool();
    }

    function closeDrawer() {
      document.getElementById('drawerOverlay').classList.remove('show');
      document.getElementById('playerDrawer').classList.remove('show');
    }

    function renderPool() {
      const list = document.getElementById('poolList');
      if (playerPool.length === 0) {
        list.innerHTML = '<p style="color:var(--text-dim);font-size:13px;text-align:center;padding:20px">还没有队员，在上方添加</p>';
        return;
      }
      list.innerHTML = playerPool.map(name => `
        <div class="pool-item">
          <div class="pool-item-info">
            <div class="pool-avatar">${name.charAt(0)}</div>
            <div class="pool-name">${escapeHtml(name)}</div>
          </div>
          <button class="pool-delete" onclick="removePoolPlayer('${name}')">×</button>
        </div>
      `).join('');
    }

    function addPoolPlayer() {
      const input = document.getElementById('poolInput');
      const name = input.value.trim();
      if (!name) {
        showToast('请输入姓名');
        return;
      }
      if (playerPool.includes(name)) {
        showToast('该队员已存在');
        return;
      }
      playerPool.push(name);
      savePool();
      input.value = '';
      renderPool();
      showToast('队员添加成功');
    }

    function removePoolPlayer(name) {
      playerPool = playerPool.filter(n => n !== name);
      savePool();
      renderPool();
    }

    // Add a "队员库" button in header
    const headerEl = document.querySelector('.header');
    const poolBtn = document.createElement('button');
    poolBtn.className = 'btn btn-secondary btn-sm';
    poolBtn.style.cssText = 'position:absolute;right:16px;top:22px;';
    poolBtn.textContent = '👥 队员库';
    poolBtn.onclick = openDrawer;
    headerEl.style.position = 'relative';
    headerEl.appendChild(poolBtn);

    // Initialize
    loadData();
    render();

    // Prevent zoom on iOS
    document.addEventListener('gesturestart', e => e.preventDefault());
  </script>
</body>
</html>
