<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灯下白 | 播客播放量追踪</title>
    <link rel="stylesheet" href="/podcast-dashboard/styles.css?v=20260716a" />
    <style>
      #back-home-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-height: 48px;
        padding: 0 20px;
        border-radius: 999px;
        text-decoration: none;
        color: #243041;
        font-size: 14px;
        font-weight: 650;
        line-height: 1;
        letter-spacing: -0.01em;
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid rgba(188, 200, 216, 0.42);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.96),
          0 12px 26px rgba(152, 169, 190, 0.14);
        backdrop-filter: blur(18px) saturate(130%);
        -webkit-backdrop-filter: blur(18px) saturate(130%);
      }

      #back-home-link:visited,
      #back-home-link:hover,
      #back-home-link:active {
        color: #243041;
        text-decoration: none;
      }

      #back-home-link .back-home-icon {
        font-size: 16px;
        line-height: 1;
        position: relative;
        top: -1px;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  </head>
  <body>
    <main class="page">
      <div class="page-toolbar">
        <a id="back-home-link" class="back-home-link" href="/zh">
          <span class="back-home-icon" aria-hidden="true">←</span>
          <span id="back-home-label">返回首页</span>
        </a>
      </div>

      <section class="hero">
        <div class="hero-brand">
          <div class="hero-logo-shell">
            <img
              class="hero-show-logo"
              src="/podcast-dashboard/dengxiabai-logo.png"
              alt="灯下白 logo"
              width="132"
              height="132"
              decoding="async"
            />
          </div>
          <div class="hero-copy-block">
            <p class="eyebrow">Podcast Tracker</p>
            <h1 id="show-name">灯下白播客</h1>
            <p id="hero-copy" class="hero-copy">欢迎点击右边你喜欢的平台收听并订阅</p>
          </div>
        </div>
        <div id="hero-links" class="hero-links"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>最新概览</h2>
            <p id="snapshot-meta" class="muted">还没有快照</p>
          </div>
          <div class="panel-actions">
            <p id="refresh-status" class="muted refresh-status">页面会优先显示最新公开快照</p>
            <button id="refresh-button" type="button" class="primary-button refresh-button" onclick="window.podcastDashboardRefresh && window.podcastDashboardRefresh(event)">立即刷新数据</button>
          </div>
        </div>
        <div id="overview-cards" class="cards"></div>
      </section>

      <section class="panel range-panel">
        <div class="panel-head panel-head-wrap">
          <div>
            <h2>3 月 3 日至今数据面板</h2>
            <p id="range-meta" class="muted">正在整理历史时间范围</p>
          </div>
          <p id="range-coverage" class="muted">正在计算数据覆盖情况</p>
        </div>
        <div id="range-cards" class="cards range-cards"></div>
        <div class="chart-grid range-chart-grid">
          <div class="chart-card">
            <div class="chart-title">周度净增长</div>
            <div id="weekly-growth-chart" class="chart-box range-chart-box"></div>
          </div>
          <div class="chart-card">
            <div class="chart-title">最新平台份额</div>
            <div id="platform-share-chart" class="chart-box range-chart-box"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>平台总播放</h2>
          <p class="muted">这里记录你在各后台看到的节目总播放量。</p>
        </div>
        <div id="platform-summary" class="summary-grid"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>单集表现</h2>
          <p class="muted">按照最新快照展示；带日期的数字是该平台最后一次真实抓取值，不计入今日合计。</p>
        </div>
        <div class="table-wrap">
          <table id="episode-summary-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
        <div id="episode-summary-pagination" class="pagination" aria-label="单集表现分页"></div>
      </section>

      <details id="history-panel" class="panel collapse-panel">
        <summary class="collapse-summary">
          <div class="panel-head">
            <h2>快照历史</h2>
            <p class="muted">点击展开内部分析明细</p>
          </div>
        </summary>
        <div class="table-wrap">
          <table id="history-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
        <div id="history-pagination" class="pagination" aria-label="快照历史分页"></div>
        <div class="subsection-head">
          <div>
            <h3>单集快照历史</h3>
            <p class="muted">选择一期节目查看按日期记录的平台播放量，不再一次生成全部历史表格。</p>
          </div>
          <label class="history-filter">
            <span>选择节目</span>
            <select id="episode-history-select" aria-label="选择要查看的节目"></select>
          </label>
        </div>
        <div class="chart-card episode-history-chart-card">
          <div id="episode-history-chart-title" class="chart-title">单集播放趋势</div>
          <div id="episode-history-chart" class="chart-box history-chart"></div>
        </div>
        <div id="episode-history"></div>
        <div id="episode-history-pagination" class="pagination" aria-label="单集快照历史分页"></div>
      </details>
    </main>

    <script type="module" src="/podcast-dashboard/app.js?v=20260716a"></script>
  </body>
  </html>
